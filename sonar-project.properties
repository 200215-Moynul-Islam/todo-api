# Unique project identifier in SonarQube
sonar.projectKey=todo-api

# Display name shown in SonarQube UI
sonar.projectName=Todo API

# Current project version
sonar.projectVersion=1.0.0

# Root directory containing source code
sonar.sources=.

# Root directory containing test files
sonar.tests=.

# Go test file pattern
sonar.test.inclusions=**/*_test.go

# Exclude directories/files from analysis
sonar.exclusions=vendor/**,.git/**,.vscode/**,postman/**,docs/**,tmp/**

# Encoding of source files
sonar.sourceEncoding=UTF-8

# Go coverage report
sonar.go.coverage.reportPaths=coverage.out
